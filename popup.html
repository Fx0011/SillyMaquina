<!DOCTYPE html>
<html lang="pt_BR">
	<head>
		<meta charset="UTF-8" />
		<title>SM Login</title>
		<link rel="stylesheet" href="style_popup.css" />
	</head>
	<body>
		<div class="container">
			<img src="icons/icon48.png" alt="SM Logo" class="logo" />
			<h2>Login - Silly Maquina</h2>
			<div id="messageArea"></div>
			<form id="loginForm">
				<div class="form-group">
					<label for="user">Usuário:</label>
					<input type="text" id="user" required />
				</div>
				<div class="form-group">
					<label for="password">Senha:</label>
					<input type="password" id="password" required />
				</div>
				<button type="submit" id="loginButton">Entrar</button>
			</form>
			<p class="status-message" id="statusMessage" style="display: none"></p>
			<button id="openOptionsButton" style="display: none; margin-top: 15px">Abrir Opções</button>
		</div>
		<script src="popup.js"></script>
	</body>
</html>
